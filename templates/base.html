<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StockFlow {% block title %}{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="/" class="text-2xl font-bold text-blue-600">StockFlow</a>
            <div class="space-x-4">
                {% if session.user_id %}
                    <a href="/products/" class="text-gray-700 hover:text-blue-600">Products</a>
                    <a href="/" class="text-gray-700 hover:text-blue-600">Dashboard</a>
                    <a href="/settings/" class="text-gray-700 hover:text-blue-600">Settings</a>
                    <a href="/auth/logout" class="text-gray-700 hover:text-blue-600">Logout</a>
                {% else %}
                    <a href="/auth/login" class="text-gray-700 hover:text-blue-600">Login</a>
                    <a href="/auth/signup" class="text-gray-700 hover:text-blue-600">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-4 py-8">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="bg-green-100 text-green-800 p-3 rounded mb-4">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        {% block content %}{% endblock %}
    </main>
</body>
</html>
