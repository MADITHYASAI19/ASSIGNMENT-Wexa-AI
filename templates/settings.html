{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-6">Organization Settings</h1>
    
    <form method="POST" action="/settings/set-threshold" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Default Low Stock Threshold</label>
            <p class="text-xs text-gray-500 mb-2">Items with quantity below this number will be highlighted on the dashboard.</p>
            <input type="number" name="threshold" value="{{ threshold }}" class="w-full md:w-1/3 px-3 py-2 border border-gray-300 rounded" required>
        </div>
        
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Save Settings</button>
    </form>
</div>
{% endblock %}
