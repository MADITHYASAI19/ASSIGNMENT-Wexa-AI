{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow">
    <h1 class="text-2xl font-bold mb-4">Create Account</h1>
    
    {% if errors %}
        {% for error in errors %}
            <div class="bg-red-100 text-red-800 p-2 rounded mb-2 text-sm">{{ error }}</div>
        {% endfor %}
    {% endif %}
    
    <form method="POST" class="space-y-4">
        <div>
            <label class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" name="email" class="w-full px-3 py-2 border border-gray-300 rounded" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Organization Name</label>
            <input type="text" name="org_name" class="w-full px-3 py-2 border border-gray-300 rounded" required>
        </div>
        <div>
            <label class="block text-sm font-medium text-gray-700">Password (min 6 chars)</label>
            <input type="password" name="password" class="w-full px-3 py-2 border border-gray-300 rounded" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Sign Up</button>
    </form>
    
    <p class="mt-4 text-center text-sm text-gray-600">
        Already have an account? <a href="/auth/login" class="text-blue-600 hover:underline">Login</a>
    </p>
</div>
{% endblock %}
